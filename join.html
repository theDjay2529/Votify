<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Votify — Join a Room</title>
  <meta name="description" content="Enter your room code to join a Votify music session." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎧</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/join.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow purple"></div>
  <div class="bg-glow cyan"></div>

  <div class="toast-container" id="toast-container"></div>

  <main class="join-page">

    <!-- Brand -->
    <div class="join-brand">
      <span class="join-logo">🎧</span>
      <h1 class="join-title gradient-text">Votify</h1>
    </div>

    <!-- Step 1: Room Code -->
    <div class="join-card glass-card" id="step-code">
      <h2 class="join-card-title">Enter Room Code</h2>
      <p class="join-card-desc">Got a 6-character code from the host? Type it in below.</p>

      <form id="code-form" novalidate>
        <input
          type="text"
          id="code-input"
          class="code-input"
          placeholder="NEON42"
          maxlength="6"
          autocomplete="off"
          autocapitalize="characters"
          spellcheck="false"
          aria-label="6-character room code"
        />
        <p class="form-error hidden" id="code-error" role="alert"></p>
        <button type="submit" class="btn-primary btn-full" id="btn-join-code">
          Join Room →
        </button>
      </form>
    </div>

    <!-- Step 2: PIN Entry (shown if room has a PIN) -->
    <div class="join-card glass-card hidden" id="step-pin">
      <div class="join-step-icon">🔒</div>
      <h2 class="join-card-title">Room PIN Required</h2>
      <p class="join-card-desc"><strong id="pin-room-name"></strong> is protected. Enter the PIN from your host.</p>

      <form id="pin-form" novalidate>
        <input
          type="password"
          id="pin-input"
          class="code-input"
          placeholder="••••"
          maxlength="8"
          inputmode="numeric"
          autocomplete="off"
          aria-label="Room PIN"
        />
        <p class="form-error hidden" id="pin-error" role="alert"></p>
        <button type="submit" class="btn-primary btn-full" id="btn-submit-pin">Verify PIN →</button>
        <button type="button" class="btn-secondary btn-full" id="btn-back-from-pin" style="margin-top:8px;">← Back</button>
      </form>
    </div>

    <!-- Step 3: Auth / Guest Modal -->
    <div class="join-card glass-card hidden" id="step-identity">
      <div class="join-step-icon">👤</div>
      <h2 class="join-card-title">Who Are You?</h2>
      <p class="join-card-desc">You're joining <strong id="identity-room-name"></strong>. Sign in for a personalised experience or jump in as a guest.</p>

      <button class="btn-google btn-full" id="btn-participant-google" type="button">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.6 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.6 13.3l7.8 6C12.3 13.1 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17z"/><path fill="#FBBC05" d="M10.4 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A24 24 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.8-6z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.3 0-11.6-4.2-13.6-9.9l-7.8 6C6.6 42.6 14.6 48 24 48z"/></svg>
        Sign in with Google
      </button>

      <div class="auth-divider"><span>or</span></div>

      <div class="guest-section">
        <input
          type="text"
          id="guest-name"
          class="form-input"
          placeholder="Your name (optional)"
          maxlength="30"
          autocomplete="off"
        />
        <button class="btn-primary btn-full" id="btn-guest" type="button">Continue as Guest →</button>
      </div>
    </div>

  </main>

  <script type="module" src="/js/join.js"></script>
</body>
</html>
