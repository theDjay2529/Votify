<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Votify — Sign In</title>
  <meta name="description" content="Sign in to Votify to host your own crowd-controlled music room." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎧</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
  <!-- Animated background -->
  <div class="bg-grid"></div>
  <div class="auth-orb auth-orb-1"></div>
  <div class="auth-orb auth-orb-2"></div>

  <!-- Toast -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ── Main Auth Card ── -->
  <main class="auth-page" id="auth-page">
    <div class="auth-card glass-card">

      <!-- Brand -->
      <div class="auth-brand">
        <span class="auth-logo">🎧</span>
        <h1 class="auth-title gradient-text">Votify</h1>
        <p class="auth-subtitle">Sign in to host your music room</p>
      </div>

      <!-- Google button -->
      <button class="btn-google" id="btn-google" type="button">
        <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.6 2.5 30.2 0 24 0 14.6 0 6.6 5.4 2.6 13.3l7.8 6C12.3 13.1 17.7 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17z"/>
          <path fill="#FBBC05" d="M10.4 28.7A14.6 14.6 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A24 24 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.8-6z"/>
          <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.3 0-11.6-4.2-13.6-9.9l-7.8 6C6.6 42.6 14.6 48 24 48z"/>
        </svg>
        Continue with Google
      </button>

      <div class="auth-divider"><span>or</span></div>

      <!-- Username / Password form -->
      <form class="auth-form" id="auth-form" novalidate>
        <div class="form-group">
          <label for="input-username" class="form-label">Username</label>
          <input
            type="text"
            id="input-username"
            class="form-input"
            placeholder="your_username"
            autocomplete="username"
            autocapitalize="none"
            spellcheck="false"
          />
        </div>
        <div class="form-group">
          <label for="input-password" class="form-label">Password</label>
          <div class="input-password-wrapper">
            <input
              type="password"
              id="input-password"
              class="form-input"
              placeholder="••••••••"
              autocomplete="current-password"
            />
            <button type="button" class="btn-toggle-pw" id="btn-toggle-pw" aria-label="Toggle password visibility">
              <svg id="pw-icon-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="pw-icon-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" class="hidden"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <p class="form-error hidden" id="form-error" role="alert"></p>
        <button type="submit" class="btn-primary btn-submit" id="btn-submit">Sign In</button>
      </form>
    </div>
  </main>

  <!-- ── Profile Setup Overlay (shown after first Google OAuth) ── -->
  <div class="setup-overlay hidden" id="setup-overlay" aria-modal="true" role="dialog" aria-label="Profile Setup">
    <div class="setup-card glass-card">
      <div class="setup-icon">👤</div>
      <h2 class="setup-title">Set Up Your Profile</h2>
      <p class="setup-desc">Choose a username for your Votify host account. You'll also see an option to set a password so you can sign in without Google in the future.</p>

      <form class="auth-form" id="setup-form" novalidate>
        <div class="form-group">
          <label for="setup-username" class="form-label">Choose a Username <span class="form-hint">(min 6 chars, letters/numbers/_)</span></label>
          <input
            type="text"
            id="setup-username"
            class="form-input"
            placeholder="your_username"
            autocapitalize="none"
            autocomplete="off"
            spellcheck="false"
            maxlength="30"
          />
        </div>
        <div class="form-group">
          <label for="setup-password" class="form-label">
            Set a Password <span class="form-hint">(optional — lets you sign in with username &amp; password instead of Google)</span>
          </label>
          <input
            type="password"
            id="setup-password"
            class="form-input"
            placeholder="min 8 characters (optional)"
            autocomplete="new-password"
          />
        </div>
        <p class="form-error hidden" id="setup-error" role="alert"></p>
        <button type="submit" class="btn-primary btn-submit" id="btn-setup-submit">Save &amp; Continue →</button>
      </form>
    </div>
  </div>

  <script type="module" src="/js/auth-page.js"></script>
</body>
</html>
